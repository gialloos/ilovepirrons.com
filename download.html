<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILOVEPIRRONS - Download</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/download.css">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">ILOVEPIRRONS</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="blog.html" class="nav-link">BLOG</a>
                <a href="live.html" class="nav-link">LIVE</a>
                <a href="download.html" class="nav-link active">DOWNLOAD</a>
                <a href="merch.html" class="nav-link">MERCH</a>
                <a href="discografia.html" class="nav-link">DISCOGRAFIA</a>
                <a href="gioco.html" class="nav-link" data-no-router>SDM</a>
            </div>
        </div>
    </nav>

    <main class="download-container">

        <!-- DJLAMA.mp4: sfondo fisso a tutta pagina, sotto tutto il contenuto -->
        <div class="dl-fullbg">
            <video autoplay loop muted playsinline>
                <source src="visual%20sito/DJLAMA.mp4" type="video/mp4">
            </video>
        </div>

        <header class="download-header">
            <h1 class="glitch-text">DOWNLOAD</h1>
        </header>

        <!-- Old-School Media Player -->
        <section class="player-section">
            <div class="media-player">
                <div class="player-header">
                    <span class="player-title">ILOVEPIRRONS Media Player</span>
                    <div class="player-controls-mini">
                        <button class="mini-btn">_</button>
                        <button class="mini-btn">□</button>
                        <button class="mini-btn">×</button>
                    </div>
                </div>
                <div class="player-body">
                    <div class="player-info">
                        <div class="now-playing">
                            <span class="now-playing-label">NOW PLAYING:</span>
                            <span class="now-playing-song" id="now-playing-song">Select a song</span>
                        </div>
                        <div class="player-artist" id="player-artist">-</div>
                    </div>
                    <div class="player-controls">
                        <button class="player-btn" id="btn-prev">⏮</button>
                        <button class="player-btn play-btn" id="btn-play">▶</button>
                        <button class="player-btn" id="btn-pause" style="display: none;">⏸</button>
                        <button class="player-btn" id="btn-stop">⏹</button>
                        <button class="player-btn" id="btn-next">⏭</button>
                    </div>
                    <div class="player-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <div class="progress-time">
                            <span id="current-time">00:00</span> / <span id="total-time">00:00</span>
                        </div>
                    </div>
                    <div class="player-equalizer">
                        <div class="eq-bar"></div>
                        <div class="eq-bar"></div>
                        <div class="eq-bar"></div>
                        <div class="eq-bar"></div>
                        <div class="eq-bar"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Songs List -->
        <section class="songs-section">
            <h2 class="section-title">AVAILABLE SONGS</h2>
            <div class="songs-list" id="songs-list">
                <!-- Songs will be loaded here via JavaScript -->
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <span class="footer-logo">ILOVEPIRRONS</span>
            <span class="footer-sep">|</span>
            <a href="mailto:ilovepirrons@gmail.com" class="footer-link">ilovepirrons@gmail.com</a>
            <span class="footer-sep">|</span>
            <span class="footer-piva">P.IVA 12345678901</span>
        </div>
    </footer>

    <script src="data/songs.json"></script>
    <!-- Global App Shell Scripts -->
    <script src="js/router.js"></script>
    <script src="js/windows.js"></script>
    <script src="js/polpolpo.js"></script>
    
    <!-- Data Source (CORS-proof) -->
    <script src="js/data_discografia.js"></script>

    <!-- Page Logic (Preloaded for SPA) -->
    <script src="js/blog.js"></script>
    <script src="js/live.js"></script>
    <script src="js/download.js"></script>
    <script src="js/merch.js"></script>
    <script src="js/discografia.js"></script>
</body>
</html>
