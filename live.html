<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILOVEPIRRONS - Live</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/live.css">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">ILOVEPIRRONS</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="blog.html" class="nav-link">BLOG</a>
                <a href="live.html" class="nav-link active">LIVE</a>
                <a href="download.html" class="nav-link">DOWNLOAD</a>
                <a href="merch.html" class="nav-link">MERCH</a>
                <a href="discografia.html" class="nav-link">DISCOGRAFIA</a>
            </div>
        </div>
    </nav>

    <main class="live-container">
        <header class="live-header">
            <h1 class="glitch-text">PARTE LIVE FOTO E DATE</h1>
            <p class="live-subtitle">streams, events & dates</p>
        </header>

        <!-- Live Stream Section -->
        <section class="live-stream-section">
            <h2 class="section-title">🔴 LIVE NOW</h2>
            <div class="stream-container">
                <div class="stream-placeholder">
                    <div class="stream-overlay">
                        <span class="stream-text">LIVE STREAM</span>
                        <span class="stream-status">OFFLINE</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Upcoming Events -->
        <section class="events-section">
            <h2 class="section-title">📅 UPCOMING EVENTS</h2>
            <div class="events-grid" id="events-grid">
                <!-- Events will be loaded here via JavaScript -->
            </div>
        </section>

        <!-- Past Events -->
        <section class="events-section">
            <h2 class="section-title">📸 PAST EVENTS</h2>
            <div class="events-grid" id="past-events-grid">
                <!-- Past events will be loaded here via JavaScript -->
            </div>
        </section>
    </main>

    <script src="data/events.json"></script>
    <!-- Global App Shell Scripts -->
    <script src="js/router.js"></script>
    <script src="js/windows.js"></script>
    
    <!-- Data Source (CORS-proof) -->
    <script src="js/data_discografia.js"></script>

    <!-- Page Logic (Preloaded for SPA) -->
    <script src="js/blog.js"></script>
    <script src="js/live.js"></script>
    <script src="js/download.js"></script>
    <script src="js/merch.js"></script>
    <script src="js/discografia.js"></script>
</body>
</html>
